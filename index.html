<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lições</title>
<style>
  :root{
    --white: #ffffff;
    --bg: #fafafa;
    --bg-soft: #f6f6f6;
    --gray-1: #ececec;
    --gray-2: #e6e6e6;
    --gray-3: #dadada;
    --ink: #111111;
    --ink-soft: #666666;
    --ink-mute: #9a9a9a;
    --accent: #0a84ff;
    --accent-soft: rgba(10,132,255,0.10);
    --radius-lg: 32px;
    --radius-md: 24px;
    --radius-sm: 18px;
    --shadow-soft: 0 6px 20px rgba(0,0,0,0.05);
    --shadow-float: 0 12px 40px rgba(0,0,0,0.08);
    --ease: cubic-bezier(.2,.8,.2,1);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  *:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  .app{
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 28px 100px;
  }

  header{ display:flex; flex-direction:column; gap: 6px; margin-bottom: 40px; }
  .eyebrow{ font-size: 13px; font-weight: 600; letter-spacing: 0.02em; color: var(--accent); }
  h1{ font-size: 42px; line-height: 1.08; letter-spacing: -0.025em; font-weight: 700; margin: 4px 0 0; color: var(--ink); }
  .sub{ color: var(--ink-soft); font-size: 16px; margin-top: 8px; font-weight: 400; }

  .segmented{
    display:flex; flex-wrap: wrap;
    background: var(--gray-1);
    border-radius: 980px;
    padding: 5px; margin: 36px 0 44px; gap: 4px;
  }
  .segmented button{
    flex:1; min-width: 100px; border:none; background: transparent;
    padding: 12px 14px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft);
    border-radius: 980px; cursor: pointer;
    transition: background .25s var(--ease), color .25s var(--ease), box-shadow .25s var(--ease), transform .2s var(--ease);
    font-family: inherit; white-space: nowrap;
  }
  .segmented button.active{ background: var(--white); color: var(--ink); box-shadow: var(--shadow-soft); }
  .segmented button:hover{ color: var(--ink); }

  .view{ display:none; }
  .view.active{ display:block; animation: rise .38s var(--ease); }

  @keyframes rise{
    from{ opacity:0; transform: translateY(8px) scale(.99); filter: blur(2px); }
    to{ opacity:1; transform: translateY(0) scale(1); filter: blur(0); }
  }

 /* ===== DASHBOARD — ÁREA LIVRE (estilo mural) ===== */
.grid{
  position: relative;
  width: 100%;
  min-height: 420px;
  background-image: radial-gradient(var(--gray-2) 1px, transparent 1px);
  background-size: 18px 18px;
  border-radius: var(--radius-md);
}

.widget{
  position: absolute;
  border-radius: var(--radius-md);
  background: var(--white);
  box-shadow: var(--shadow-soft);
  padding: 16px 18px;
  cursor: grab;
  transition: box-shadow .18s var(--ease), transform .12s var(--ease);
  display:flex; flex-direction: column; justify-content: center; overflow: hidden;
  user-select: none;
  touch-action: none;
}
.widget.dragging{ box-shadow: var(--shadow-float); transform: scale(1.02); z-index: 20; cursor: grabbing; }
.widget:hover{ box-shadow: var(--shadow-float); }

.widget.counter{ background: var(--accent-soft); }
.widget .label{ font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-mute); margin-bottom: 6px; }
.widget .big{ font-size: 34px; font-weight: 800; letter-spacing: -0.02em; text-align:center; color: var(--accent); }
.widget .center{ display:flex; align-items:center; justify-content:center; height:100%; }
.widget .glyph-sm{
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--gray-1); display:flex; align-items:center; justify-content:center;
  font-size: 20px; font-weight: 300; color: var(--ink-soft);
  transition: background .18s, color .18s;
}
.widget:hover .glyph-sm{ background: var(--accent-soft); color: var(--accent); }
.widget .quote{ font-size: 14.5px; line-height: 1.4; font-weight: 600; color: var(--ink); }

.widget[data-color="blue"]{ background: rgba(10,132,255,0.12); }
.widget[data-color="orange"]{ background: rgba(255,149,0,0.14); }
.widget[data-color="pink"]{ background: rgba(255,45,85,0.12); }
.widget[data-color="dark"]{ background: #1c1c1e; }
.widget[data-color="dark"] .label,
.widget[data-color="dark"] .quote,
.widget[data-color="dark"] .big{ color: #f5f5f7; }

.widget-palette-btn{
  position: absolute; top: 8px; right: 8px;
  width: 22px; height: 22px; border-radius: 50%;
  border: none; background: rgba(0,0,0,0.06); color: var(--ink-soft);
  font-size: 11px; cursor: pointer; opacity: 0;
  display: flex; align-items:center; justify-content:center;
  transition: opacity .2s;
}
.widget:hover .widget-palette-btn{ opacity: 1; }

.palette-pop{
  position: absolute; z-index: 30;
  display: flex; gap: 6px;
  background: rgba(30,30,32,0.95);
  padding: 8px; border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}
.palette-dot{
  width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
  border: 2px solid rgba(255,255,255,0.2);
  transition: transform .15s;
}
.palette-dot:hover{ transform: scale(1.15); }
.palette-dot[data-c="white"]{ background:#fff; }
.palette-dot[data-c="blue"]{ background:#0a84ff; }
.palette-dot[data-c="purple"]{ background:#af52de; }
.palette-dot[data-c="green"]{ background:#34c759; }
.palette-dot[data-c="orange"]{ background:#ff9500; }
.palette-dot[data-c="pink"]{ background:#ff2d55; }
.palette-dot[data-c="dark"]{ background:#1c1c1e; }

@media (max-width: 560px){
  .grid{ display:flex; flex-direction:column; gap: 14px; min-height: auto; background: none; }
  .widget{ position: static !important; width: 100% !important; height: auto !important; min-height: 100px; }
}


  .empty{ text-align:center; padding: 100px 20px; color: var(--ink-mute); }
  .empty .glyph{
    width: 64px; height: 64px; margin: 0 auto 18px; border-radius: 50%;
    background: var(--gray-1); display:flex; align-items:center; justify-content:center;
    font-size: 28px; font-weight: 300; color: var(--ink-soft);
  }
  .empty p{ margin: 4px 0; font-size: 15px; }
  .empty p strong{ color: var(--ink); font-weight: 600; }

  .lessons{ display:flex; flex-direction:column; gap: 18px; }

  .card{
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 28px 30px;
    box-shadow: var(--shadow-float);
    display:flex; gap: 18px;
    position: relative;
    transition: transform .3s var(--ease), box-shadow .3s var(--ease);
  }
  .card:hover{ transform: translateY(-3px); box-shadow: 0 18px 48px rgba(0,0,0,0.10); }

  .num{
    flex: 0 0 auto; width: 38px; height: 38px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 14px; font-weight: 700; color: var(--accent); background: var(--accent-soft);
  }

  .card-body{ flex:1; min-width:0; }
  .lesson-text{ font-size: 17px; font-weight: 600; line-height: 1.5; letter-spacing: -0.01em; color: var(--ink); }

  .comment{
    margin-top: 10px; font-size: 14.5px; color: var(--ink-soft); line-height: 1.6;
    padding-left: 16px; border-left: 2px solid var(--gray-2);
  }

  .tag-row{ margin-top: 12px; display:flex; flex-wrap: wrap; gap: 6px; }
  .tag-chip{
    background: var(--accent-soft); color: var(--accent); border-radius: 999px;
    padding: 3px 11px; font-size: 11.5px; font-weight: 600;
  }

  .meta{ margin-top: 14px; font-size: 12px; font-weight: 500; color: var(--ink-mute); }

  .del{
    position:absolute; top: 18px; right: 18px; width: 30px; height: 30px; border-radius: 50%;
    border: none; background: var(--gray-1); color: var(--ink-soft); font-size: 13px; cursor:pointer;
    opacity: 0;
    transition: opacity .25s var(--ease), background .25s var(--ease), color .25s var(--ease), transform .2s var(--ease);
  }
  .card:hover .del{ opacity: 1; }
  .del:hover{ background: #ff3b30; color: #fff; transform: scale(1.06); }

  .form-card{ background: var(--white); border-radius: var(--radius-lg); padding: 40px 36px; box-shadow: var(--shadow-float); }

  label{ display:block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-mute); margin-bottom: 10px; }

  textarea, input[type="text"]{
    width: 100%; border: none; border-radius: var(--radius-sm);
    padding: 18px 20px; font-family: inherit; font-size: 16px; color: var(--ink);
    background: var(--bg-soft); resize: vertical; line-height: 1.6;
    transition: box-shadow .25s var(--ease), background .25s var(--ease);
  }
  textarea::placeholder, input::placeholder{ color: var(--ink-mute); }
  textarea:focus, input[type="text"]:focus{
    outline:none; background: var(--white);
    box-shadow: 0 0 0 4px var(--accent-soft), var(--shadow-soft);
  }

  #lessonInput{ min-height: 100px; margin-bottom: 30px; }
  #commentInput{ min-height: 70px; margin-bottom: 30px; }
  #tagsInput{ padding: 14px 20px; margin-bottom: 0; }

  .actions{ display:flex; justify-content:flex-end; gap: 12px; margin-top: 32px; }

  button.primary{
    border:none; padding: 14px 28px; border-radius: 980px; font-size: 15px; font-weight: 600;
    color:#fff; background: var(--accent); cursor:pointer; font-family: inherit;
    transition: transform .2s var(--ease), box-shadow .2s var(--ease), opacity .2s var(--ease);
    box-shadow: 0 10px 24px rgba(10,132,255,0.28);
  }
  button.primary:hover{ transform: translateY(-1px) scale(1.02); }
  button.primary:active{ transform: scale(0.97); }
  button.primary:disabled{ opacity:.35; cursor:not-allowed; box-shadow:none; transform:none; }

  button.ghost{
    border: none; background: var(--gray-1); padding: 14px 26px; border-radius: 980px;
    font-size: 15px; font-weight: 600; color: var(--ink-soft); cursor:pointer; font-family: inherit;
    transition: background .2s var(--ease), transform .2s var(--ease);
  }
  button.ghost:hover{ background: var(--gray-2); transform: translateY(-1px); }

  .toast{
    position: fixed; left: 50%; bottom: 40px;
    transform: translateX(-50%) translateY(24px) scale(.96);
    background: rgba(17,17,17,0.9);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    backdrop-filter: blur(20px) saturate(160%);
    color:#fff; padding: 14px 24px; border-radius: 980px; font-size: 14px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity .3s var(--ease), transform .3s var(--ease);
    z-index: 50;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

  .ideas-header{ margin-bottom: 28px; }
  .ideas-header .sub{ margin-top: 6px; }

  .ideas-list{
    display: flex;
    flex-direction: column;
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-float);
    overflow: hidden;
  }

  .idea-item{
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--gray-1);
    transition: background .2s var(--ease);
  }
  .idea-item:last-child{ border-bottom: none; }
  .idea-item:hover{ background: var(--bg-soft); }

  .idea-check{
    flex: 0 0 auto;
    width: 24px;
    height: 24px;
    margin-top: 1px;
    border-radius: 50%;
    border: 2px solid var(--gray-3);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 13px;
    transition: background .2s var(--ease), border-color .2s var(--ease), transform .15s var(--ease);
  }
  .idea-check.checked{
    background: var(--accent);
    border-color: var(--accent);
  }
  .idea-check:hover{ transform: scale(1.08); }

  .idea-text{
    flex: 1;
    font-size: 16px;
    line-height: 1.45;
    color: var(--ink);
    word-break: break-word;
    outline: none;
    cursor: text;
  }
  .idea-item.done .idea-text{
    color: var(--ink-mute);
    text-decoration: line-through;
  }

  .idea-del{
    flex: 0 0 auto;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--ink-mute);
    font-size: 13px;
    cursor: pointer;
    opacity: 0;
    transition: opacity .2s var(--ease), background .2s var(--ease), color .2s var(--ease);
  }
  .idea-item:hover .idea-del{ opacity: 1; }
  .idea-del:hover{ background: #ff3b30; color: #fff; }

  .idea-add{
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 18px;
    padding: 16px 20px;
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
  }
  .idea-add-icon{
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
  }
  #ideaInput{
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 16px;
    color: var(--ink);
  }
  #ideaInput::placeholder{ color: var(--ink-mute); }
  #ideaInput:focus{ outline: none; }

  @media (max-width: 480px){
    h1{ font-size: 32px; }
    .app{ padding: 48px 18px 100px; }
    .card{ padding: 22px 20px; }
    .form-card{ padding: 28px 22px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <span class="eyebrow">Diário pessoal</span>
    <h1>Lições</h1>
    <p class="sub">O que a vida te ensinou — guardado num lugar só seu.</p>
  </header>

  <div class="segmented">
    <button id="tabHome" class="active">Início</button>
    <button id="tabList">Lições</button>
    <button id="tabWrite">Escrever</button>
    <button id="tabIdeas"> Ideias</button>
  </div>

  <div id="viewHome" class="view active">
    <div class="grid" id="widgetGrid"></div>
  </div>

  <div id="viewList" class="view">
    <div id="emptyState" class="empty" style="display:none;">
      <div class="glyph">＋</div>
      <p><strong>Nenhuma lição ainda</strong></p>
      <p>Toque em "Escrever" para guardar a primeira.</p>
    </div>
    <div id="lessonsList" class="lessons"></div>
  </div>

  <div id="viewWrite" class="view">
    <div class="form-card">
      <label for="lessonInput">Lição principal</label>
      <textarea id="lessonInput" placeholder="O que você aprendeu?"></textarea>

      <label for="commentInput">Comentário (opcional)</label>
      <textarea id="commentInput" placeholder="Um contexto, um detalhe, uma reflexão curta..."></textarea>

      <label for="tagsInput">Tags (opcional)</label>
      <input type="text" id="tagsInput" placeholder="trabalho, foco, dinheiro...">

      <div class="actions">
        <button class="ghost" id="cancelBtn">Cancelar</button>
        <button class="primary" id="saveBtn" disabled>Guardar lição</button>
      </div>
    </div>
  </div>

  <div id="viewIdeas" class="view">
    <div class="ideas-header">
      <span class="eyebrow">RASCUNHOS</span>
      <p class="sub">Ideias soltas. Marque quando fixar ou concluir.</p>
    </div>

    <div id="ideasEmpty" class="empty" style="display:none;">
      <div class="glyph">✓</div>
      <p><strong>Nenhuma ideia ainda</strong></p>
      <p>Adicione uma abaixo para começar sua lista.</p>
    </div>

    <div class="ideas-list" id="ideasList"></div>

    <form id="ideaForm" class="idea-add">
      <span class="idea-add-icon">＋</span>
      <input type="text" id="ideaInput" placeholder="Nova ideia..." autocomplete="off" />
    </form>
  </div>
</div>

<div class="toast" id="toast">Lição guardada.</div>

<script>
(function(){
  /* ====== REFERÊNCIAS DOM ====== */
  const tabHome = document.getElementById('tabHome');
  const tabList = document.getElementById('tabList');
  const tabWrite = document.getElementById('tabWrite');
  const tabIdeas = document.getElementById('tabIdeas');
  const viewHome = document.getElementById('viewHome');
  const viewList = document.getElementById('viewList');
  const viewWrite = document.getElementById('viewWrite');
  const viewIdeas = document.getElementById('viewIdeas');
  const lessonsList = document.getElementById('lessonsList');
  const emptyState = document.getElementById('emptyState');
  const lessonInput = document.getElementById('lessonInput');
  const commentInput = document.getElementById('commentInput');
  const tagsInput = document.getElementById('tagsInput');
  const saveBtn = document.getElementById('saveBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const toast = document.getElementById('toast');
  const widgetGrid = document.getElementById('widgetGrid');

  /* ====== ESTADO ====== */
  let lessons = [];
  let ideas = [];
  let widgetOrder = null;

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=> toast.classList.remove('show'), 1800);
  }

  /* ====== NAVEGAÇÃO ENTRE ABAS ====== */
  const tabs = { home: [tabHome, viewHome], list: [tabList, viewList], write: [tabWrite, viewWrite], ideas: [tabIdeas, viewIdeas] };

  function switchTab(which){
    Object.values(tabs).forEach(([btn, view]) => { btn.classList.remove('active'); view.classList.remove('active'); });
    const [btn, view] = tabs[which];
    btn.classList.add('active');
    view.classList.add('active');

    if(which === 'list') render();
    if(which === 'home') renderDashboard();
    if(which === 'ideas') renderIdeas();
    if(which === 'write'){
      lessonInput.value = '';
      commentInput.value = '';
      tagsInput.value = '';
      saveBtn.disabled = true;
      lessonInput.focus();
    }
  }

  tabHome.addEventListener('click', ()=> switchTab('home'));
  tabList.addEventListener('click', ()=> switchTab('list'));
  tabWrite.addEventListener('click', ()=> switchTab('write'));
  tabIdeas.addEventListener('click', ()=> switchTab('ideas'));
  cancelBtn.addEventListener('click', ()=> switchTab('list'));

  lessonInput.addEventListener('input', ()=>{
    saveBtn.disabled = lessonInput.value.trim().length === 0;
  });

  /* ====== HELPERS ====== */
  function formatDate(ts){
    const d = new Date(ts);
    return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
  }
  function parseTags(raw){
    return raw.trim() ? raw.trim().split(',').map(t => t.trim().toLowerCase()).filter(Boolean) : [];
  }
  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ====== VIEW "LIÇÕES" ====== */
  function render(){
    lessonsList.innerHTML = '';
    if(lessons.length === 0){
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    const sorted = [...lessons].sort((a,b)=> b.createdAt - a.createdAt);

    sorted.forEach((item, idx) => {
      const num = sorted.length - idx;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="num">${num}</div>
        <div class="card-body">
          <div class="lesson-text"></div>
          ${item.comment ? '<div class="comment"></div>' : ''}
          ${item.tags && item.tags.length ? `<div class="tag-row">${item.tags.map(t => `<span class="tag-chip">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          <div class="meta">${formatDate(item.createdAt)}</div>
        </div>
        <button class="del" title="Apagar">✕</button>
      `;
      card.querySelector('.lesson-text').textContent = item.text;
      if(item.comment){
        card.querySelector('.comment').textContent = item.comment;
      }
      card.querySelector('.del').addEventListener('click', () => deleteLesson(item.id));
      lessonsList.appendChild(card);
    });
  }

  /* ====== VIEW "INÍCIO" — DASHBOARD LIVRE ====== */
  const widgetDefs = [
    { id: 'hoje', render: renderDateWidget },
    { id: 'ultima', render: renderLastWidget },
    { id: 'ideasw', render: renderIdeasWidget },
    { id: 'contador', render: renderCounterWidget },
    { id: 'escrever', render: renderNewBtnWidget },
    { id: 'aleatoria', render: renderRandomWidget },
  ];

  const defaultLayout = {
    hoje:      { x: 0,   y: 0,   w: 160, h: 112, color: 'white' },
    ultima:    { x: 174, y: 0,   w: 334, h: 238, color: 'white' },
    contador:  { x: 522, y: 0,   w: 160, h: 112, color: 'blue' },
    ideasw:    { x: 0,   y: 126, w: 334, h: 112, color: 'white' },
    escrever:  { x: 522, y: 126, w: 160, h: 112, color: 'white' },
    aleatoria: { x: 348, y: 252, w: 334, h: 112, color: 'white' },
  };

  let widgetLayout = null;

  function renderDateWidget(){
    const raw = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });
    const nice = raw.charAt(0).toUpperCase() + raw.slice(1);
    return `<div class="label">Hoje</div><div style="font-weight:700;font-size:14px">${nice}</div>`;
  }
  function renderLastWidget(){
    const sorted = [...lessons].sort((a,b)=> b.createdAt - a.createdAt);
    const last = sorted[0];
    return `<div class="label">Última lição</div><div class="quote">${last ? escapeHtml(last.text) : 'Nenhuma lição ainda'}</div>`;
  }
  function renderIdeasWidget(){
    const pending = ideas.filter(i => !i.done).length;
    return `<div style="font-weight:700;font-size:15px;margin-bottom:4px">Ideias</div><div class="label" style="margin-bottom:0">${pending} pendente${pending === 1 ? '' : 's'} →</div>`;
  }
  function renderCounterWidget(){
    return `<div class="big">${lessons.length}</div><div class="label" style="text-align:center;margin-bottom:0">lições guardadas</div>`;
  }
  function renderNewBtnWidget(){
    return `<div class="center"><div class="glyph-sm">＋</div></div>`;
  }
  function renderRandomWidget(){
    const r = lessons.length ? lessons[Math.floor(Math.random() * lessons.length)] : null;
    return `<div class="label">Você escreveu isso antes...</div><div class="quote">${r ? escapeHtml(r.text) : 'Sem lições ainda'}</div>`;
  }

  function getLayout(){
    return widgetLayout || JSON.parse(JSON.stringify(defaultLayout));
  }

  let activePalette = null;

  function closePalette(){
    if(activePalette){ activePalette.remove(); activePalette = null; }
  }

  function renderDashboard(){
    widgetGrid.innerHTML = '';
    const layout = getLayout();

    widgetDefs.forEach(def => {
      const pos = layout[def.id] || defaultLayout[def.id];
      const div = document.createElement('div');
      div.className = `widget`;
      div.dataset.id = def.id;
      div.dataset.color = pos.color || 'white';
      div.style.left = pos.x + 'px';
      div.style.top = pos.y + 'px';
      div.style.width = pos.w + 'px';
      div.style.height = pos.h + 'px';
      div.innerHTML = def.render();

      const paletteBtn = document.createElement('button');
      paletteBtn.className = 'widget-palette-btn';
      paletteBtn.textContent = '🎨';
      paletteBtn.title = 'Mudar cor';
      div.appendChild(paletteBtn);

      paletteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openPalette(div, def.id);
      });

      div.addEventListener('click', (e) => {
        if(e.target === paletteBtn) return;
        if(wasDragged) { wasDragged = false; return; }
        if(def.id === 'ideasw') switchTab('ideas');
        if(def.id === 'escrever') switchTab('write');
      });

      makeDraggable(div, def.id);
      widgetGrid.appendChild(div);
    });
  }

  function openPalette(widgetEl, id){
    closePalette();
    const colors = ['white','blue','purple','green','orange','pink','dark'];
    const pop = document.createElement('div');
    pop.className = 'palette-pop';
    pop.style.left = (parseInt(widgetEl.style.left) + 4) + 'px';
    pop.style.top = (parseInt(widgetEl.style.top) - 40) + 'px';
    colors.forEach(c => {
      const dot = document.createElement('span');
      dot.className = 'palette-dot';
      dot.dataset.c = c;
      dot.onclick = (e) => {
        e.stopPropagation();
        setWidgetColor(id, c);
        closePalette();
      };
      pop.appendChild(dot);
    });
    widgetGrid.appendChild(pop);
    activePalette = pop;
  }

  document.addEventListener('click', () => closePalette());

  async function setWidgetColor(id, color){
    const layout = getLayout();
    layout[id] = { ...layout[id], color };
    widgetLayout = layout;
    await persistLayout(layout);
    renderDashboard();
  }

  /* ---- Drag livre (mouse + touch) ---- */
  let wasDragged = false;

  function makeDraggable(el, id){
    let startX, startY, origX, origY, moved = false;

    function onDown(e){
      if(e.target.closest('.widget-palette-btn')) return;
      const point = e.touches ? e.touches[0] : e;
      startX = point.clientX;
      startY = point.clientY;
      origX = parseInt(el.style.left);
      origY = parseInt(el.style.top);
      moved = false;
      el.classList.add('dragging');
      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('mouseup', onUp);
      document.addEventListener('touchend', onUp);
    }

    function onMove(e){
      const point = e.touches ? e.touches[0] : e;
      const dx = point.clientX - startX;
      const dy = point.clientY - startY;
      if(Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
      if(!moved) return;
      e.preventDefault();
      const container = widgetGrid.getBoundingClientRect();
      let newX = origX + dx;
      let newY = origY + dy;
      newX = Math.max(0, Math.min(newX, container.width - el.offsetWidth));
      newY = Math.max(0, newY);
      el.style.left = newX + 'px';
      el.style.top = newY + 'px';
    }

    async function onUp(){
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchend', onUp);
      if(moved){
        wasDragged = true;
        const layout = getLayout();
        layout[id] = {
          ...layout[id],
          x: parseInt(el.style.left),
          y: parseInt(el.style.top)
        };
        widgetLayout = layout;
        await persistLayout(layout);
      }
    }

    el.addEventListener('mousedown', onDown);
    el.addEventListener('touchstart', onDown, { passive: true });
  }

  /* ====== VIEW "IDEIAS" — CHECKLIST ====== */
  function renderIdeas(){
    const container = document.getElementById('ideasList');
    const empty = document.getElementById('ideasEmpty');
    container.innerHTML = '';

    if(ideas.length === 0){
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    ideas.slice().sort((a,b) => b.createdAt - a.createdAt).forEach(idea => {
      const el = document.createElement('div');
      el.className = 'idea-item' + (idea.done ? ' done' : '');
      el.innerHTML = `
        <button class="idea-check ${idea.done ? 'checked' : ''}">${idea.done ? '✓' : ''}</button>
        <div class="idea-text" contenteditable="true"></div>
        <button class="idea-del" title="Apagar">✕</button>
      `;
      el.querySelector('.idea-text').textContent = idea.text;

      el.querySelector('.idea-check').onclick = () => toggleIdea(idea.id);
      el.querySelector('.idea-del').onclick = () => deleteIdea(idea.id);

      const txtDiv = el.querySelector('.idea-text');
      txtDiv.onblur = () => editIdea(idea.id, txtDiv.textContent.trim());
      txtDiv.onkeydown = (e) => {
        if(e.key === 'Enter'){
          e.preventDefault();
          txtDiv.blur();
        }
      };

      container.appendChild(el);
    });
  }

  async function addIdea(text){
    if(!text.trim()) return;
    ideas.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
      text: text.trim(),
      done: false,
      createdAt: Date.now()
    });
    await persistIdeas();
    renderIdeas();
  }

  async function toggleIdea(id){
    ideas = ideas.map(i => i.id === id ? { ...i, done: !i.done } : i);
    await persistIdeas();
    renderIdeas();
  }

  async function editIdea(id, newText){
    if(newText === ''){
      deleteIdea(id);
    } else {
      ideas = ideas.map(i => i.id === id ? { ...i, text: newText } : i);
      await persistIdeas();
    }
  }

  async function deleteIdea(id){
    ideas = ideas.filter(i => i.id !== id);
    await persistIdeas();
    renderIdeas();
  }

  document.getElementById('ideaForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('ideaInput');
    addIdea(input.value);
    input.value = '';
  });

  /* ====== PERSISTÊNCIA (localStorage) ====== */
  async function loadLessons(){
    try{
      const raw = localStorage.getItem('licoes:list');
      lessons = raw ? JSON.parse(raw) : [];
    }catch(e){
      lessons = [];
    }
  }

  async function persist(){
    try{
      localStorage.setItem('licoes:list', JSON.stringify(lessons));
    }catch(e){
      console.error('Falha ao salvar', e);
    }
  }

  async function loadIdeas(){
    try{
      const raw = localStorage.getItem('licoes:ideas');
      ideas = raw ? JSON.parse(raw) : [];
    }catch(e){
      ideas = [];
    }
  }

  async function persistIdeas(){
    try{
      localStorage.setItem('licoes:ideas', JSON.stringify(ideas));
    }catch(e){
      console.error('Falha ao salvar ideias', e);
    }
  }

  async function loadLayout(){
    try{
      const raw = localStorage.getItem('licoes:widget-layout');
      widgetLayout = raw ? JSON.parse(raw) : null;
    }catch(e){
      widgetLayout = null;
    }
  }

  async function persistLayout(layout){
    try{
      localStorage.setItem('licoes:widget-layout', JSON.stringify(layout));
    }catch(e){
      console.error('Falha ao salvar layout', e);
    }
  }

  async function loadOrder(){
    try{
      const raw = localStorage.getItem('licoes:widget-order');
      widgetOrder = raw ? JSON.parse(raw) : null;
    }catch(e){
      widgetOrder = null;
    }
  }

  async function persistOrder(order){
    try{
      localStorage.setItem('licoes:widget-order', JSON.stringify(order));
    }catch(e){
      console.error('Falha ao salvar ordem', e);
    }
  }

  /* ====== AÇÕES: LIÇÕES ====== */
  async function saveLesson(){
    const text = lessonInput.value.trim();
    if(!text) return;
    const comment = commentInput.value.trim();
    const tags = parseTags(tagsInput.value);
    lessons.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
      text,
      comment,
      tags,
      createdAt: Date.now()
    });
    await persist();
    showToast('Lição guardada.');
    switchTab('list');
  }

  async function deleteLesson(id){
    lessons = lessons.filter(l => l.id !== id);
    await persist();
    render();
    showToast('Lição apagada.');
  }

  saveBtn.addEventListener('click', saveLesson);

  /* ====== INICIALIZAÇÃO ====== */
  (async function init(){
    await Promise.all([loadLessons(), loadOrder(), loadIdeas(), loadLayout()]);
    renderDashboard();
  })();
})();
</script>

</body>
